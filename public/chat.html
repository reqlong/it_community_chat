<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT技术社区 - 聊天室</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航 -->
        <header class="top-bar">
            <div class="logo">
                <h2>IT技术频道</h2>
            </div>
            <div class="user-info">
                <img id="currentUserAvatar" src="" alt="头像" class="avatar-small" style="cursor:pointer;">
                <span id="currentUserName"></span>
                <a id="adminLink" href="/admin.html" class="btn btn-small btn-admin" style="display:none;">后台管理</a>
                <button id="logoutBtn" class="btn btn-small btn-danger">注销</button>
            </div>
        </header>

        <div class="main-content">
            <!-- 左侧边栏：频道成员 + 共享文件库 -->
            <aside class="sidebar left-sidebar">
                <div class="sidebar-header">
                    <h3>频道成员</h3>
                    <span id="onlineCount" class="online-count">0 在线</span>
                </div>
                <div id="usersList" class="users-list">
                    <!-- 用户列表动态生成 -->
                </div>
                <div class="file-library">
                    <div class="sidebar-header">
                        <h3>共享文件库</h3>
                        <button id="uploadDocBtn" class="btn btn-small btn-primary">上传文件</button>
                    </div>
                    <div id="folderNav" class="folder-nav">
                        <div class="folder-tree-item folder-tree-root active" data-folder="" onclick="switchFolder('')">
                            <span class="folder-tree-icon">&#127968;</span>
                            <span class="folder-tree-name">根目录</span>
                        </div>
                    </div>
                    <div id="documentsList" class="documents-list">
                        <!-- 文档列表动态生成 -->
                    </div>
                </div>
            </aside>

            <!-- 中间聊天区域 -->
            <main class="chat-area">
                <div class="chat-header">
                    <h3>技术交流大厅</h3>
                </div>
                <div id="messagesContainer" class="messages-container">
                    <!-- 消息动态生成 -->
                </div>
                <div class="chat-input-area">
                    <div class="input-wrapper">
                        <textarea id="messageInput" placeholder="输入消息... (Ctrl+Enter 发送)" rows="1"></textarea>
                        <button id="emojiBtn" class="btn btn-small" type="button">&#128512;</button>
                        <button id="sendBtn" class="btn btn-primary">发送</button>
                    </div>
                    <div id="emojiPanel" class="emoji-panel"></div>
                </div>
            </main>
        </div>
    </div>

    <!-- 编辑资料弹窗 -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑资料</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="avatar-preview">
                    <img id="previewAvatar" src="" alt="当前头像" style="cursor:pointer;">
                    <label for="avatarInput" class="btn btn-small">更换头像</label>
                    <input type="file" id="avatarInput" accept="image/*" hidden>
                </div>
                <div class="form-group" style="display:flex;align-items:center;gap:8px;">
                    <label style="margin-bottom:0;">账号</label>
                    <span id="profileUsername" style="color:var(--text-light);font-size:14px;"></span>
                </div>
                <div class="form-group" style="display:flex;align-items:center;gap:12px;">
                    <label for="nicknameInput" style="margin-bottom:0;white-space:nowrap;">昵称</label>
                    <input type="text" id="nicknameInput" placeholder="设置你的昵称" maxlength="30">
                </div>
                <div class="form-group" style="display:flex;align-items:center;gap:12px;">
                    <label style="margin-bottom:0;white-space:nowrap;">性别</label>
                    <div class="gender-select">
                        <label class="gender-option">
                            <input type="radio" name="gender" value="male">
                            <span class="gender-icon male">&#9794;</span>
                            <span>男</span>
                        </label>
                        <label class="gender-option">
                            <input type="radio" name="gender" value="female">
                            <span class="gender-icon female">&#9792;</span>
                            <span>女</span>
                        </label>
                        <label class="gender-option">
                            <input type="radio" name="gender" value="gay">
                            <span class="gender-icon gay">&#9893;</span>
                            <span>Gay</span>
                        </label>
                    </div>
                </div>
                <div class="password-section">
                    <div class="section-title">修改密码</div>
                    <div class="form-group" style="display:flex;align-items:center;gap:12px;">
                        <label for="oldPassword" style="margin-bottom:0;white-space:nowrap;">旧密码</label>
                        <input type="password" id="oldPassword" placeholder="输入当前密码">
                    </div>
                    <div class="form-group" style="display:flex;align-items:center;gap:12px;">
                        <label for="newPassword" style="margin-bottom:0;white-space:nowrap;">新密码</label>
                        <input type="password" id="newPassword" placeholder="输入新密码（至少6位）" minlength="6">
                    </div>
                    <div class="form-group" style="display:flex;align-items:center;gap:12px;">
                        <label for="confirmNewPassword" style="margin-bottom:0;white-space:nowrap;">确认新密码</label>
                        <input type="password" id="confirmNewPassword" placeholder="再次输入新密码" minlength="6">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="saveProfileBtn" class="btn btn-primary">保存</button>
                <button class="btn btn-secondary modal-close">取消</button>
            </div>
        </div>
    </div>

    <!-- 上传文档弹窗 -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>上传技术文档</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="documentInput">选择文件</label>
                    <input type="file" id="documentInput" required>
                    <small class="help-text">支持 PDF、Word、代码文件等，最大 50MB</small>
                </div>
                <div class="form-group">
                    <label for="uploadFolderSelect">上传到</label>
                    <select id="uploadFolderSelect">
                        <option value="">根目录</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="docDescription">文档描述</label>
                    <textarea id="docDescription" placeholder="简要描述文档内容..." rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button id="confirmUploadBtn" class="btn btn-primary">上传</button>
                <button class="btn btn-secondary modal-close">取消</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/chat.js"></script>
</body>
</html>
