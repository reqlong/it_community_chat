<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT技术社区 - 登录/注册</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
    <div class="auth-bg">
        <img src="https://api.paugram.com/wallpaper/" alt="background" onerror="this.style.display='none'">
    </div>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>IT技术社区</h1>
                <p class="subtitle">自由技术交流，共享知识价值</p>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">登录</button>
                <button class="tab-btn" data-tab="register">注册</button>
            </div>

            <!-- 登录表单 -->
            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label for="loginUsername">用户名</label>
                    <input type="text" id="loginUsername" placeholder="请输入用户名" required minlength="3" maxlength="20">
                </div>
                <div class="form-group">
                    <label for="loginPassword">密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-block">登录</button>
            </form>

            <!-- 注册表单 -->
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="registerUsername">用户名</label>
                    <input type="text" id="registerUsername" placeholder="请输入用户名 (字母/数字/下划线, 3-20字符)" required minlength="3" maxlength="20">
                </div>
                <div class="form-group">
                    <label for="registerPassword">密码</label>
                    <input type="password" id="registerPassword" placeholder="请输入密码 (至少6位)" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">确认密码</label>
                    <input type="password" id="confirmPassword" placeholder="请再次输入密码" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-block">注册</button>
            </form>

            <div id="authMessage" class="message"></div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
